<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Crear Bóveda</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="card">
    <h1>Crear nueva bóveda</h1>
    <p>Selecciona la carpeta donde se guardará tu bóveda</p>

    <div class="selector">
      <input type="text" id="rutaInput" placeholder="Ninguna carpeta seleccionada" readonly />
      <button id="btnSeleccionar">Examinar</button>
    </div>

    <button id="btnCrear" disabled>Crear bóveda</button>

    <div id="mensaje"></div>
  </div>

  <script>
    const rutaInput = document.getElementById("rutaInput");
    const btnSeleccionar = document.getElementById("btnSeleccionar");
    const btnCrear = document.getElementById("btnCrear");
    const mensaje = document.getElementById("mensaje");

    let rutaSeleccionada = null;

    btnSeleccionar.addEventListener("click", async () => {
      const ruta = await window.api.seleccionarCarpeta();
      if (ruta) {
        rutaSeleccionada = ruta;
        rutaInput.value = ruta;
        btnCrear.disabled = false;
        mensaje.textContent = "";
      }
    });

    btnCrear.addEventListener("click", async () => {
      if (!rutaSeleccionada) return;

      btnCrear.disabled = true;
      btnCrear.textContent = "Creando...";
      mensaje.textContent = "";
      mensaje.className = "";

      const resultado = await window.api.crearBoveda(rutaSeleccionada);

      if (resultado.ok) {
        mensaje.textContent = `Bóveda creada en: ${resultado.ruta}`;
        mensaje.className = "exito";
        btnCrear.textContent = "Bóveda creada";
        // Redireccion a la principal
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1200);

      } else {
        mensaje.textContent = resultado.error;
        mensaje.className = "error";
        btnCrear.disabled = false;
        btnCrear.textContent = "Crear bóveda";
      }
    });
  </script>
</body>
</html>
