<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>Vault</title>
  <link rel="stylesheet" href="../styles.css" />

</head>
<body>
  <div class="app">

    <!-- Barra lateral de iconos -->
    <nav class="rail" aria-label="Navegacion principal">
      <div class="rail-mark" title="Vault">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 2 L21 7 V17 L12 22 L3 17 V7 Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
          <path d="M12 2 V22 M3 7 L21 17 M21 7 L3 17" stroke="currentColor" stroke-width="0.7" opacity="0.5"/>
        </svg>
      </div>

      <div class="rail-group">
        <button class="rail-btn is-active" data-view="welcome" title="Inicio">
          <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 11.5 12 4l8 7.5"/>
            <path d="M6 10v9a1 1 0 0 0 1 1h3v-6h4v6h3a1 1 0 0 0 1-1v-9"/>
          </svg>
          <span class="rail-tip">Inicio</span>
        </button>

        <button class="rail-btn" data-view="new-note" title="Nueva nota">
          <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          <span class="rail-tip">Nueva nota</span>
        </button>

        <button class="rail-btn" data-view="search" title="Buscar">
          <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="6.5"/>
            <path d="m20 20-3.8-3.8"/>
          </svg>
          <span class="rail-tip">Buscar</span>
        </button>

        <button class="rail-btn" data-view="graph" title="Grafo">
          <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6" cy="6" r="2"/>
            <circle cx="18" cy="7" r="2"/>
            <circle cx="9" cy="17" r="2"/>
            <circle cx="18" cy="17" r="2"/>
            <path d="M7.7 6.9 16.3 7.1M8.1 8.4 9.2 15.1M10.8 16.5 16.3 16.6M17.5 8.9 17.7 15.1"/>
          </svg>
          <span class="rail-tip">Grafo</span>
        </button>

        <button class="rail-btn" data-view="attachments" title="Adjuntos">
          <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
            <circle cx="9" cy="10" r="1.6"/>
            <path d="m5 17 4.5-4.5a1.5 1.5 0 0 1 2.1 0L19 20"/>
          </svg>
          <span class="rail-tip">Adjuntos</span>
        </button>
      </div>

      <div class="rail-bottom">
        <button class="rail-btn" data-view="settings" title="Configuracion">
          <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 13a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V19a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 13a1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 6.6a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34H9a1.7 1.7 0 0 0 1-1.55V0"/>
          </svg>
          <span class="rail-tip">Configuracion</span>
        </button>
      </div>
    </nav>

    <!-- Contenido principal: carrusel de frases + panel de nota rapida -->
    <main class="content" id="view-welcome">

      <section class="carousel" aria-label="Frases para empezar el dia">
        <div class="carousel-glow" aria-hidden="true"></div>

        <p class="eyebrow">Esta es la pagina para notas </p>

        <div class="carousel-track">
          <button class="carousel-arrow" id="prev-phrase" aria-label="Frase anterior">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m15 5-7 7 7 7"/></svg>
          </button>

          <blockquote class="carousel-phrase" id="phrase-text">Cargando frases...</blockquote>

          <button class="carousel-arrow" id="next-phrase" aria-label="Frase siguiente">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m9 5 7 7-7 7"/></svg>
          </button>
        </div>

      </section>

      <aside class="note-panel">
        <h2 class="note-title">Nota rapida</h2>
        <textarea id="note-input" class="note-textarea" placeholder="Escribe algo antes de empezar el dia..."></textarea>
        <div class="note-footer">
          <span class="note-status" id="note-status"></span>
          <button class="btn btn-primary" id="btn-save-note">Guardar</button>
        </div>
      </aside>

    </main>
  </div>
  
  <script src="renderer.js"></script>
</body>
</html>
